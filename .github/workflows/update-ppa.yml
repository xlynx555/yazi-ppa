name: Update PPA Changelog

on:
  schedule:
    # Check for new upstream releases daily at 06:00 UTC
    - cron: '0 6 * * *'
  workflow_dispatch:
    inputs:
      force_version:
        description: 'Force a specific upstream version (without "v", e.g. 26.1.22). Leave empty for latest.'
        required: false
        default: ''

# Only one run at a time to avoid concurrent changelog commits.
concurrency:
  group: update-ppa
  cancel-in-progress: false

jobs:
  check-and-update:
    runs-on: ubuntu-24.04

    steps:
      - uses: actions/checkout@v4

      - name: Get latest upstream release
        id: upstream
        run: |
          TAG=$(curl -fsSL \
            -H "Accept: application/vnd.github+json" \
            https://api.github.com/repos/sxyazi/yazi/releases/latest \
            | jq -r '.tag_name')
          echo "version=${TAG#v}" >> "$GITHUB_OUTPUT"

      - name: Resolve target version
        id: resolve
        run: |
          FORCED="${{ github.event.inputs.force_version }}"
          VERSION="${FORCED:-${{ steps.upstream.outputs.version }}}"
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
          echo "Target version: ${VERSION}"

      - name: Get current packaged version
        id: current
        run: |
          # Extract the bare upstream version from the changelog (strip ~ppa... suffix)
          V=$(dpkg-parsechangelog -Sversion | sed 's/[~+].*//')
          echo "version=${V}" >> "$GITHUB_OUTPUT"
          echo "Packaged version: ${V}"

      - name: Check if update is needed
        id: check
        run: |
          TARGET="${{ steps.resolve.outputs.version }}"
          CURRENT="${{ steps.current.outputs.version }}"
          FORCED="${{ github.event.inputs.force_version }}"
          if [ "${TARGET}" != "${CURRENT}" ] || [ -n "${FORCED}" ]; then
            echo "needed=true" >> "$GITHUB_OUTPUT"
            echo "Update required: ${CURRENT} → ${TARGET}"
          else
            echo "needed=false" >> "$GITHUB_OUTPUT"
            echo "Already up to date (${CURRENT})."
          fi

      - name: Install devscripts
        if: steps.check.outputs.needed == 'true'
        run: sudo apt-get install -y --no-install-recommends devscripts

      - name: Update changelog
        if: steps.check.outputs.needed == 'true'
        env:
          VERSION: ${{ steps.resolve.outputs.version }}
          DEBFULLNAME: ${{ secrets.DEBFULLNAME }}
          DEBEMAIL: ${{ secrets.DEBEMAIL }}
        run: ./scripts/update-changelog.sh "${VERSION}"

      - name: Commit and push
        if: steps.check.outputs.needed == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add debian/changelog
          git commit -m "chore: update to yazi ${{ steps.resolve.outputs.version }}"
          git push
